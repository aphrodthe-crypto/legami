<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animazioni Legami Chimici</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }
        .container { 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
            max-width: 800px; 
            margin: auto; 
        }
        .box { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        
        /* Stili per gli atomi */
        .atom { 
            border-radius: 50%; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            color: white; 
            position: relative; 
            z-index: 2;
        }
        .metal { background: #ff5722; width: 70px; height: 70px; }
        .nonmetal { background: #4caf50; width: 80px; height: 80px; }
        .hydrogen { background: #2196f3; width: 50px; height: 50px; }
        .oxygen { background: #e91e63; width: 80px; height: 80px; }
        
        /* Elettroni */
        .electron { 
            width: 12px; 
            height: 12px; 
            background: #ffc107; 
            border-radius: 50%; 
            position: absolute; 
            border: 1px solid #d4a100;
        }

        /* 1. Animazione Legame Ionico */
        .stage-ionic { display: flex; justify-content: center; align-items: center; gap: 80px; position: relative; height: 100px; }
        .move-e { animation: transfer 2s ease-in-out infinite alternate; top: 30px; left: 35px; }
        @keyframes transfer { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(110px); } 
        }

        /* 2. Animazione Legame Covalente Apolare */
        .stage-apolar { display: flex; justify-content: center; align-items: center; position: relative; height: 100px; }
        .orbit-e1 { animation: orbit1 2s linear infinite; z-index: 3; }
        .orbit-e2 { animation: orbit2 2s linear infinite; z-index: 3; margin-top: 20px;}
        @keyframes orbit1 { 
            0% { transform: translateX(-25px); } 
            50% { transform: translateX(25px); } 
            100% { transform: translateX(-25px); } 
        }
        @keyframes orbit2 { 
            0% { transform: translateX(25px); } 
            50% { transform: translateX(-25px); } 
            100% { transform: translateX(25px); } 
        }

        /* 3. Animazione Legame a Idrogeno */
        .stage-hbond { display: flex; justify-content: center; align-items: center; gap: 10px; height: 100px; }
        .dashed-line { 
            width: 60px; 
            height: 0; 
            border-bottom: 4px dashed #999; 
            animation: blink 1.5s infinite; 
        }
        @keyframes blink { 
            0%, 100% { opacity: 0.2; } 
            50% { opacity: 1; } 
        }
    </style>
</head>
<body>

    <h2>Animazioni dei Legami Chimici</h2>

    <div class="container">
        
        <!-- Legame Ionico -->
        <div class="box">
            <h3>1. Legame Ionico (Es. Na + Cl)</h3>
          
            <div class="stage-ionic">
                <div class="atom metal">Na
                    <div class="electron move-e"></div>
                </div>
                <div class="atom nonmetal">Cl</div>
            </div>
        </div>

        <!-- Legame Covalente Apolare -->
        <div class="box">
            <h3>2. Legame Covalente Apolare (Es. H + H)</h3>
           
            <div class="stage-apolar">
                <div class="atom hydrogen" style="margin-right: -10px;">H</div>
                <div class="electron orbit-e1"></div>
                <div class="electron orbit-e2"></div>
                <div class="atom hydrogen" style="margin-left: -10px;">H</div>
            </div>
        </div>

        <!-- Legame a Idrogeno -->
        <div class="box">
            <h3>3. Legame a Idrogeno (Tra molecole d'Acqua)</h3>
   
            <div class="stage-hbond">
                <div class="atom oxygen">O</div>
                <div class="dashed-line"></div>
                <div class="atom hydrogen">H</div>
            </div>
        </div>

    </div>

</body>
</html>
